<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Document</title>
        <style>
            #inps input {display: table; margin: 10px 0; width: 50px; text-align: right;}
        </style>
    </head>
    <body>
        <button id="del">-</button>
        <button id="add">+</button>
        <div id="inps"></div>
        <button id="sumBtn">Sum</button>
        <button id="avgBtn">Avg</button>
        <button id="minBtn">Min</button>
        <button id="maxBtn">Max</button>
        <h1></h1>

        <script>
            const del = document.getElementById('del')
            const add = document.getElementById('add')
            const sumBtn = document.getElementById('sumBtn')
            const avgBtn = document.getElementById('avgBtn')
            const minBtn = document.getElementById('minBtn')
            const maxBtn = document.getElementById('maxBtn')
            const inps = document.getElementById('inps')
            const h1 = document.querySelector('h1')
            let n = 2

            show()

            del.onclick = function() {
                if(n > 2) n--
                show(n)
            }
            add.onclick = function() {
                if(n < 10) n++
                show(n)
            }
            sumBtn.onclick = function() {
                h1.innerHTML = calcSum()
            }
            avgBtn.onclick = function() {
                h1.innerHTML = calcSum() / n
            }

            function calcSum(arr, f) {
                let s = 1
                for (let i = 0; i < arr.length; i++) {
                    s = f(s, arr[i])
                }
                return s
            }

            function sum(a, b){return a + b}
            function mult(a, b){return a * b}

            function getVal() {
                let list = inps.querySelectorAll('input')
                let arr = []
                for (let i = 0; i < list.length; i++) {
                    arr.push(+list[i].value)
                }
                return arr
            }

            function show() {
                let kod = ''
                for (let i = 0; i < n; i++) {
                    kod += `<input type="text">`
                }
                inps.innerHTML = kod
            }
        </script>
    </body>
</html>
