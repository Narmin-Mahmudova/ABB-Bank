<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="ntc"></p>

    <script>
        const ntc = document.getElementById("ntc")
        let sum = 0;
        for(let i = 0; i <= 100; i++){
            if(i % 3 == 0){
                sum += 1
            }
        }
        ntc.innerHTML = "Say:" + sum
    </script>
</body>
</html>
