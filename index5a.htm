<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <span id="balance">500</span>Azn
    </div>
    <input type="text" id="amount" placeholder="Mebleg daxil edin:">
    <button onclick="add()">+ Elave et</button>
    <button onclick="del()">- Balansdan sil</button>
    <p id="result"></p>

    <script>
        const amountEl = document.getElementById('amount')
        const balanceEl = document.getElementById('balance')
        const result = document.getElementById('result')
        let balance = 500;
        
        function add(){
            let amount = +amountEl.value;
            balance += amount;
            balanceEl.innerHTML = balance;
            result.innerHTML = 'mebleg balansiniza elave olundu';
        }
        function del(){
            let amount = amountEl.value;
            if(amount > balance){
                result.innerHTML = 'balansda kifayet qeder mebleg yoxdur';
            }else{
                balance -= amount;
                balanceEl.innerHTML = balance;
                result.innerHTML = 'mebleg balansdan silindi';
            }
        }
    </script>
</body>
</html>
