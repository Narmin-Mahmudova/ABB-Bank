<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .green{background-color: green;}
        .black{background-color: black;}
    </style>
</head>
<body>
    <table id="table" cellspacing="0" cellpadding="10" border="1" align="center"></table>

    <script>
        let table = document.getElementById("table")
        html = "";

        for(let i = 0; i<=10; i++){
        html += "<tr>"
            for (let j = 0; j <= 10; j++){
                if((i + j) % 2 == 0){
                    html += "<td class='green' ></td>"
                }else{
                    html += "<td class='black'></td>"
                }
            }
        html += "</tr>"
        }
        table.innerHTML = html;
    </script>
</body>
</html>
