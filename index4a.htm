<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="text" placeholder="Adinizi daxil edin">
    <button onclick="goster()">Daxil et</button>
    <p id="ntc"></p>

    <script>
        let ad = document.getElementById('text')
        let ntc = document.getElementById('ntc')

        function goster(){
            ntc.innerHTML=(text.value == '') ? 'Salam qonaq' : `Salam ${ad.value}`;
        }
    </script>
</body>
</html>
