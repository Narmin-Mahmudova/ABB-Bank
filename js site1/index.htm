<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="poppins">
    <header>
        <div class="allheader">
            <div class="logo">
                <h1>Smart<span>Home</span></h1>
            </div>
            <div class="menulist">
                <ul>
                    <li class="home">Home</li>
                    <li>About</li>
                    <div id="dropdown" class="dropdown">
                        <li onclick="toggledropdown()">Store</li>
                        <div class="drp-cnt">
                            <ul>
                                <li>Yerli </li>
                            </ul>
                        </div>
                    </div>
                    <li>Contact</li>
                </ul>
            </div>
            <div class="right">
                <button class="sign">Sign up</button>
                <button class="sign">Login</button>
                <button class="btn" onclick="togglesidebar()"><i class="fa-solid fa-bars"></i></button>
                <button class="sign" onclick="darkmode()">Dark Light Mode</button>
            </div>
        </div>
    </header>

    <div id="sidebar" class="side">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1 style="color: white;">Smart<span>Home</span></h1>
            <i onclick="togglesidebar()" style="color: white;" class="fa-solid fa-x"></i>
        </div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Store</li>
            <li>Contact</li>
        </ul>
    </div>

    <main>
        <section class="py-6 sm:py-12 text-gray-800">
            <div class="container p-6 mx-auto space-y-8">
                <div class="space-y-2 text-center">
                    <h2 class="text-3xl font-bold">Endirimli Qiymete olan Mehsullarimiz</h2>
                    <p class="font-serif text-sm dark:text-gray-600">Faydalanin</p>
                </div>
                <div id="cards" class="grid grid-cols-1 gap-x-4 gap-y-8 md:grid-cols-2 lg:grid-cols-4">
                    
                </div>
            </div>
        </section>
    </main>

    <script src="index.js"></script>
</body>

</html>
