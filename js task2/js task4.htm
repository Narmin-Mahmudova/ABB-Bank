<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="pass" placeholder="Tarixi daxil edin">
    <button onclick="goster()">Ok</button>
    <p id="ntc"></p>

    <script>
        let pass = document.getElementById('pass')
        let ntc = document.getElementById('ntc')

        function goster(){
            ntc.innerHTML=(pass.value < 2010) ? 'Kecmis istifadeci' : 'Yeni istifadeci';
        }
    </script>
</body>
</html>
