<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="n">
    <button>Ok</button>
    <h1></h1>
    <script>
        const n = document.getElementById("n")
        const btn = document.querySelector("button")
        const h1 = document.querySelectorAll("h1")
        const ten = [" ", "On", "Iyirmi", "Otuz", "Qirx", "Elli", "Altmis", "Yetmis", "Seksen", "Doxsan"]
        const num = [" ", "Bir", "Iki", "Uc", "Dord", "Bes", "Alti", "Yeddi", "Sekkiz", "Doqquz"]
        for (let i = 0; i <= 9; i++) n.innerHTML += `<option>${i}</option>` 

        btn.onclick = change
        function change() {
            let say = "", min, yuz, on, bir
            if(n.value > 999) {
                min = n.value.at(-4)
            }
            if(n.value > 99) {
                yuz = n.value.at(-3)
            }
            if(n.value > 9) {
                on = n.value.at(-2)
            }
            bir = n.value.at(-1)


            h1.innerHTML = say
        }
    </script>
</body>
</html>
