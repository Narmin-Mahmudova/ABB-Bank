<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="n" type="number">
    <button onclick="ver()">Ok</button>
    <h1 id="res"></h1>


    <script>
        const n = document.getElementById('n');
        const res = document.getElementById('res');

        function ver(){
            res.innerHTML = (n.value > 0) ? 'Musbet eded' : 
                            (n.value < 0) ? 'Menfi eded' : 'Sifir';
        }
    </script>
</body>
</html>
