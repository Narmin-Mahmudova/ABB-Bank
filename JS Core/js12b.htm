<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

    </head>
    <body>
        <script>
            arr = [12, 67, 3, 98, 24, 0, -5, 9, 8, 13, 2]

            function sirala(arr) {
                for (let i = 0; i < arr.length; i++) {
                    for (let j = 0; j < i; j++) {
                        if (arr[i] < arr[j]) {
                            let a = arr[i]
                            arr[i] = arr[j]
                            arr[j] = a 
                        }
                    }       
                }
                return arr
            }

            function min() {
                let m = arr[0]
                for (let i = 1; i < arr.length; i++) {
                    if (arr[i] < m) m = arr[i]
                }
                return m
            }

            function yoxla(x) {
                for (let i = 0; i < arr.length; i++) {
                    if (arr[i] == x) return true
                }
                return false
            }

        </script>
    </body>
</html>
