<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="n" min="2" max="9">
    <button onclick="vur()">Ok</button>
    <ul id="cedvel"></ul>

    <script>
        const n = document.getElementById('n')
        const cedvel = document.getElementById('cedvel')

        function vur(){
            let kod = ''
            for( let i = 1; i <= 9; i++){
                kod += `<li>${i} x ${n.value} = ${i * n.value} </li>`;
            }
            cedvel.innerHTML = kod
        }
    </script>
</body>
</html>
