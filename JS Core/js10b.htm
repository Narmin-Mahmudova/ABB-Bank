<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="name">
    <button onclick="add()"> + </button>
    <ul id="list"></ul>
    <script>
        const name = document.getElementById("name");
        const list = document.getElementById("list");
        let x = 0;

        function add(){
            let id = 'li' + x++;
            const li = document.getElementById("name").value;
            list.innerHTML += `<li id="${id}">${li} <button onclick="remove('${id}')"> x </button></li>`;
            name.value = '';
        }
        function remove(id){
            document.getElementById(id).remove();
        }
    </script>
</body>
</html>
