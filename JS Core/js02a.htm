        <meta charset="UTF-8" />
        <title>Document</title>
    </head>
    <body>
        <input id="ad" type="text" placeholder="Adin nedir?" />
        <button onclick="salamVer()">Ok</button>
        <h1></h1>
        
        <script>
            function salamVer() { 
                let ad = document.getElementById('ad')
                let h1 = document.querySelector('h1')
                h1.innerHTML = `Yeni ilin mübarək, 
                                    <i style=""> ${ad.value} </i>!!!`
                ad.value = ''
            }
