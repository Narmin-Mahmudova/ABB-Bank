<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {border: 1px solid #333; margin: 10px; }
        #light{ display: table; padding: 20px; }
        #light > div{width: 100px; height: 100px; border-radius: 50%;}
    </style>
</head>
<body>
    <div id="light">
        <div id="red"></div>
        <div id="yellow"></div>
        <div id="green"></div>
    </div>

    <script>
        const red = document.getElementById("red");
        const yellow = document.getElementById("yellow");
        const green = document.getElementById("green");
        let x = 0
        setInterval(changeLight, 3000);

        function changeLight(){
            x = (x + 1) % 3
            red.style.background = 'none'
            yellow.style.background = 'none'
            green.style.background = 'none'

            if(x == 1) red.style.background = "red";
            if(x == 2) yellow.style.background = "yellow";
            if(x == 0) green.style.background = "green"; 
        }
    </script>
</body>
</html>
