<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="n" min="2" max="20">!
    <button onclick="duz()"> = </button>
    <span id="res"></span>

    <script>
        const n = document.getElementById('n')
        const res = document.getElementById('res')

        function duz(){
            let kod = '1'
            let f = 1
            for (let i = 2; i <= n.value; i++){
                kod +=  ' x ' + i;
                f *= i;
            }
            res.innerHTML = kod + ' = ' + f
        }
    </script>
</body>
</html>
