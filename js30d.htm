<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <select id="olcu"></select>
    <script>
        const olcu = document.getElementById('olcu')
        const size = {
            xs: 'Mini, 17sm',
            sm: 'Kicik, 23sm',
            md: 'Orta, 30sm',
            lg: 'Boyuk, 35sm'
        }

        olcu.innerHTML = Object.values(size).map(s => `<option>${s}</option>`).join('');

        // for (const key in size) {
        //     olcu.innerHTML += `<option>${size[key]}</option>`
        // }
    </script>
</body>
</html>
